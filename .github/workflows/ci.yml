name: CI

# Runs on every PR and on pushes to main. This is the "test before it merges"
# safety net that mirrors what you'd run locally before pushing.
on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-progress run when a newer commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # The check-*.mjs scripts drive a headless WebGL browser (SwiftShader), so
      # Chromium and its system libraries must be present.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # Headless WebGL behavioural checks (scroll-snap / wheel stepping).
      # SKIP_BUILD reuses the dist/ from the Build step; the scripts boot
      # `vite preview` against it. They drive a software-rendered (SwiftShader)
      # browser whose timing differs from real hardware, so they are run for
      # visibility only — `continue-on-error` keeps them from blocking merges,
      # while lint + build above are the hard gates. Run `npm test` locally on
      # real hardware for a reliable pass/fail.
      - name: Run verification tests (non-blocking)
        continue-on-error: true
        run: npm test
        env:
          SKIP_BUILD: '1'
